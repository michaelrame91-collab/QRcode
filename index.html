<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Mon QR Code</h2>
    <div id="qrcode"></div>

    <script type="module">
        import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm";

        const canvas = document.createElement("canvas");
        document.getElementById("qrcode").appendChild(canvas);

        QRCode.toCanvas(canvas, "https://www.mairie-etampes.fr/", {
            width: 200
        }, function (error) {
            if (error) {
                console.error(error);
            }
        });
    </script>

</body>
</html>
