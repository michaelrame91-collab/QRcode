<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Wi-Fi</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #container {
            position: relative;
            display: inline-block;
        }

        /* QR code en arrière-plan */
        #qrcode {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        #qrcode canvas {
            display: block;
        }

        /* Blason au premier plan */
        #logo {
            position: relative;
            z-index: 2;
            display: block;
            width: 100px;
            height: auto;
        }
    </style>
</head>

<body>

    <h1 style="font-size: 62px;">ETAMPES-WIFI-PUBLIC</h1><br><br><br><br><br><br><br><br><br><br><br><br>

    <div id="container">
        <div id="qrcode"></div>
        <img id="logo" src="etampes.png" alt="Blason d'Étampes">
    </div>

    <script type="module">
        import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm";

        const canvas = document.createElement("canvas");
        document.getElementById("qrcode").appendChild(canvas);

        const wifiConfig = "WIFI:T:nopass;S:ETAMPES-WIFI-PUBLIC;;";

        QRCode.toCanvas(
            canvas,
            wifiConfig,
            {
                width: 580,
                margin: 1
            },
            function (error) {
                if (error) {
                    console.error(error);
                }
            }
        );
    </script>

</body>
</html>
