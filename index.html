<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Wi-Fi</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #logo {
            width: 120px;
            height: auto;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <h2>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Connexion ETAMPES-WIFI-PUBLIC</h2>

    <div id="container">
        <!-- Image à gauche -->
        <img style="height: 290px; width: 290px;" id="logo" src="etampes.png" alt="Logo">

        <!-- QR code à droite -->
        <div id="qrcode"></div>
    </div>

    <script type="module">
        import QRCode from "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm";

        const canvas = document.createElement("canvas");
        document.getElementById("qrcode").appendChild(canvas);

        // Réseau Wi-Fi ouvert
        const wifiConfig = "WIFI:T:nopass;S:ETAMPES-WIFI-PUBLIC;;";

        QRCode.toCanvas(canvas, wifiConfig, {
            width: 250
        }, function (error) {
            if (error) console.error(error);
        });
    </script>

</body>
</html>
